<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover local experiences and adventures.">
    <title>Vacatu | Experiences</title>
    
    <link rel="stylesheet" href="css/global.css">

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <!-- Light Theme Navigation -->
    <nav class="navbar">
        <div class="container" style="display: flex; align-items: center; justify-content: space-between;">
            <a href="index.html" class="nav-brand">Vacatu</a>
            
            <div class="nav-search">
                <input type="text" placeholder="Search experiences...">
                <button class="search-btn"><i class='bx bx-search'></i></button>
            </div>
            
            <div class="nav-right">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="stay.html">Stays</a></li>

    <!-- Main Content -->
